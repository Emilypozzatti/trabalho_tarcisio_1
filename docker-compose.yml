version: '3.9'

services:
  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: ghcr.io/Emilypozzatti/trabalho_tarcisio_1:latest
    ports:
      - "8000:8000"
    env_file:
      - .env

  proxy:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - app
    volumes:
      - static_volume:/static

volumes:
  postgres_data:
  static_volume: