version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  app:
    image: ghcr.io/emilypozzatti/trabalho_tarcisio_1:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db
    restart: always

  proxy:
  image: ghcr.io/emilypozzatti/trabalho_tarcisio_nginx:latest
  ports:
    - "8080:80"
  depends_on:
    - app
  restart: always

volumes:
  postgres_data: