name: Build and Deploy Django

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'app/docker-compose.yml'
      - '**/*.md'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Django image
        run: docker build -t ghcr.io/emilypozzatti/trabalho_tarcisio_1:v1.0.${{ github.run_number }} ./app

      - name: Push Django image
        run: docker push ghcr.io/emilypozzatti/trabalho_tarcisio_1:v1.0.${{ github.run_number }}

      - name: Build Nginx image
        run: docker build -t ghcr.io/emilypozzatti/trabalho_tarcisio_nginx:v1.0.${{ github.run_number }} ./nginx

      - name: Push Nginx image
        run: docker push ghcr.io/emilypozzatti/trabalho_tarcisio_nginx:v1.0.${{ github.run_number }}

      - name: Atualizar app/docker-compose.yml
        run: |
          sed -i 's|image: ghcr.io/emilypozzatti/trabalho_tarcisio_1:.*|image: ghcr.io/emilypozzatti/trabalho_tarcisio_1:v1.0.${{ github.run_number }}|' app/docker-compose.yml
          sed -i 's|image: ghcr.io/emilypozzatti/trabalho_tarcisio_nginx:.*|image: ghcr.io/emilypozzatti/trabalho_tarcisio_nginx:v1.0.${{ github.run_number }}|' app/docker-compose.yml

      - name: Commit da nova versao
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app/docker-compose.yml

          git commit -m "Atualiza imagens para versao ${{ github.run_number }}" || exit 0

          git push